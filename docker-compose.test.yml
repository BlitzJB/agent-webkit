services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: agentwebkit
      POSTGRES_PASSWORD: agentwebkit
      POSTGRES_DB: agentwebkit_test
    ports:
      - "55432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U agentwebkit -d agentwebkit_test"]
      interval: 1s
      timeout: 3s
      retries: 30
    tmpfs:
      - /var/lib/postgresql/data
