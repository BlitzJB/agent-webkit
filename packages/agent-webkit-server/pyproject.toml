[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[project]
name = "agent-webkit-server"
version = "0.1.0"
description = "Server-side toolkit for the Claude Agent SDK over HTTP+SSE: session lifecycle, permission routing, SDK bridge, plus bundled FastAPI and Postgres adapters."
readme = "README.md"
requires-python = ">=3.10"
license = "MIT"
authors = [{ name = "BlitzJB" }]
keywords = ["claude", "anthropic", "agent-sdk", "fastapi", "sse"]
classifiers = [
    "Development Status :: 3 - Alpha",
    "Intended Audience :: Developers",
    "License :: OSI Approved :: MIT License",
    "Programming Language :: Python :: 3",
    "Programming Language :: Python :: 3.10",
    "Programming Language :: Python :: 3.11",
    "Programming Language :: Python :: 3.12",
]
dependencies = [
    "pydantic>=2.0,<3.0",
    "claude-agent-sdk>=0.1.0,<0.2.0",
]

[project.optional-dependencies]
fastapi = [
    "fastapi>=0.110",
    "uvicorn>=0.27",
]
postgres = [
    "asyncpg>=0.29",
]
dev = [
    "pytest>=8.0",
    "pytest-asyncio>=0.23",
    "pytest-cov>=5.0",
    "pytest-timeout>=2.3",
    "hypothesis>=6.100",
    "httpx>=0.27",
]

[project.urls]
Homepage = "https://github.com/BlitzJB/agent-webkit"
Documentation = "https://github.com/BlitzJB/agent-webkit#readme"
Source = "https://github.com/BlitzJB/agent-webkit"
Issues = "https://github.com/BlitzJB/agent-webkit/issues"

[tool.hatch.build.targets.wheel]
packages = ["src/agent_webkit_server"]
